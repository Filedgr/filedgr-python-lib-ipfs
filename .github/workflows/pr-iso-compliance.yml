name: PR ISO Compliance

# ISO 27001 / SOC 2 control: enforce automated unit-test gate on every PR.
# The job name `iso-compliance` is the status-check context required by the
# org-level branch ruleset.

on:
  pull_request:

permissions:
  contents: read

jobs:
  iso-compliance:
    name: iso-compliance
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Cache venv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.12-${{ hashFiles('pyproject.toml', 'setup.py', 'setup.cfg', 'requirements.txt', 'requirements-test.txt') }}

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e . || .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install pytest
          if [ -f requirements-test.txt ]; then .venv/bin/pip install -r requirements-test.txt; fi

      - name: Run unit tests
        run: .venv/bin/pytest tests
